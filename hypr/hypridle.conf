general {
    lock_cmd = pidof hyprlock || hyprlock       # что запускать для блокировки
    before_sleep_cmd = loginctl lock-session    # блокировать ПЕРЕД сном
    after_sleep_cmd = hyprctl dispatch dpms on  # включить монитор после просыпания
    ignore_dbus_inhibit = true  # игнориует активные процессы и зсатвляет ноут уходить в спячку 
}

listener {
    timeout = 180                                # через 3 минуты простоя
    on-timeout = loginctl lock-session           # блокируем экран
}


listener {
    timeout = 300 
    on-timeout = hyprctl dispatch dpms off 
    on-resume = hyprctl dispatch dpms on
}

