# base
set -g default-terminal "tmux-256color"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on

# no big background bar
set -g status-style bg=default,fg=default
set -g status-position bottom
set -g status-justify left
set -g status-left ""
set -g status-right ""

# square window tabs
set -g window-status-style fg=colour244,bg=colour236
set -g window-status-current-style fg=colour250,bg=colour236,bold
set -g window-status-format " #{window_index} #{pane_current_command} "
set -g window-status-current-format " #{window_index} #{pane_current_command} "

# borders
set -g pane-border-style fg=colour245
set -g pane-active-border-style fg=colour245

# active window name
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

bind -n S-Left previous-window
bind -n S-Right next-window

# remove plugin line if you don't need TPM
# run '~/.tmux/plugins/tpm/tpm'
